<!doctype html>
<html lang="ky">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Биз жөнүндө — BiyPara</title>
<meta name="description" content="Букля — китеп дүкөнү">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script>
  (function() {
    const theme = localStorage.getItem('biypara_theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
</head>
<body data-page="about">
<header class="site-header"></header>
<main>
  <section class="about-hero container">
    <div>
      <h1><span data-i18n="about_title_a"></span> <em data-i18n="about_title_em"></em> <span data-i18n="about_title_b"></span></h1>
      <p data-i18n="about_p"></p>
    </div>
    <div class="about-card">
      <div class="v">12 000+</div>
      <h3 data-i18n="about_orders"></h3>
      <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
      <div class="v">7</div>
      <h3 data-i18n="about_cities"></h3>
      <p style="color:var(--muted);font-size:14px;margin-top:6px">Ысык-Көл, Талас, Ош, Жалал-Абад, Баткен, Нарын, Чүй.</p>
    </div>
  </section>
  <section class="container">
    <div class="section-head"><div>
      <h2 data-i18n="values_title"></h2>
      <p data-i18n="values_sub"></p>
    </div></div>
    <div class="values">
      <div class="value"><div class="ic"><i class="fa-solid fa-book"></i></div><h4 data-i18n="v1_t"></h4><p data-i18n="v1_p"></p></div>
      <div class="value"><div class="ic"><i class="fa-solid fa-truck-fast"></i></div><h4 data-i18n="v2_t"></h4><p data-i18n="v2_p"></p></div>
      <div class="value"><div class="ic"><i class="fa-solid fa-handshake"></i></div><h4 data-i18n="v3_t"></h4><p data-i18n="v3_p"></p></div>
    </div>
  </section>
</main>
<footer class="site-footer"></footer>
<script src="script.js"></script>
</body>
</html>
