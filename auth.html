<!doctype html>
<html lang="ky">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кирүү / Катталуу — Букля</title>
<meta name="description" content="Авторизация в интернет-магазине Букля">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script>
  (function() {
    const theme = localStorage.getItem('biypara_theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
</head>
<body data-page="auth">
<header class="site-header"></header>
<main class="auth-wrap">
  <div class="auth-card unified-auth">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login"> <span data-i18n="login">Кирүү</span></button>
      <button class="auth-tab" data-tab="register"> <span data-i18n="register">Катталуу</span></button>
    </div>


    <form id="login-form" class="auth-form auth-form-panel" data-panel="login">
      <div class="field">
        <label data-i18n="f_email">E-mail</label>
        <input type="email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="field">
        <label data-i18n="f_password">Сырсөз</label>
        <input type="password" name="password" placeholder="••••••" required minlength="4">
      </div>
      <button type="submit" class="btn-submit"><span data-i18n="login">Кирүү</span></button>
      <p class="auth-hint"><span data-i18n="no_account">Эсебиңиз жокпу?</span> <button type="button" class="link-tab" data-tab="register"><span data-i18n="register">Катталуу</span></button></p>
    </form>


    <form id="register-form" class="auth-form auth-form-panel hidden" data-panel="register">
      <div class="field">
        <label data-i18n="f_name">Аты-жөнү</label>
        <input type="text" name="name" placeholder="Акылбек Асанов" required>
        <div class="field-error" id="reg-name-error" style="color: var(--accent); font-size: 12px; margin-top: 4px; display: none;"></div>
      </div>
      <div class="field">
        <label data-i18n="f_email">E-mail</label>
        <input type="email" name="email" placeholder="example@email.com" required>
        <div class="field-error" id="reg-email-error" style="color: var(--accent); font-size: 12px; margin-top: 4px; display: none;"></div>
      </div>
      <div class="field">
        <label data-i18n="f_password">Сырсөз</label>
        <input type="password" name="password" placeholder="••••••" required minlength="4">
        <div class="field-error" id="reg-password-error" style="color: var(--accent); font-size: 12px; margin-top: 4px; display: none;"></div>
      </div>
      

      <div class="field">
        <label data-i18n="f_city">Шаар/Район</label>
        <input type="text" id="reg-city" placeholder="Бишкек, Ош, Жалал-Абад..." required>
        <div class="field-error" id="reg-city-error" style="color: var(--accent); font-size: 12px; margin-top: 4px; display: none;"></div>
      </div>
      <div class="field">
        <label data-i18n="f_street">Көчөсү</label>
        <input type="text" id="reg-street" placeholder="Чүй пр." required>
      </div>
      <div class="field">
        <label data-i18n="f_apartment">Үй/Апартамент</label>
        <input type="text" id="reg-apartment" placeholder="114" required>
      </div>
      
      <button type="submit" class="btn-submit"><span data-i18n="register">Катталуу</span></button>
      <p class="auth-hint"><span data-i18n="have_account">Эсебиңиз барбы?</span> <button type="button" class="link-tab" data-tab="login"><span data-i18n="login">Кирүү</span></button></p>
    </form>
  </div>
</main>
<footer class="site-footer"></footer>
<script src="script.js"></script>
</body>
</html>
